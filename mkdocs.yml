site_name: ApplePy
site_description: Create native Python extensions in Swift
site_url: https://jagtesh.github.io/ApplePy
repo_url: https://github.com/jagtesh/ApplePy
repo_name: jagtesh/ApplePy

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Getting Started: getting-started.md
  - Guide:
    - Macros Reference: guide/macros.md
    - Type Conversion: guide/type-conversion.md
    - Memory Management: guide/memory-management.md
    - Building & Packaging: guide/building.md
  - Examples:
    - Overview: examples/index.md
    - SwiftKeychain: examples/swiftkeychain.md
    - PyNatural: examples/pynatural.md
    - PyCoreML: examples/pycoreml.md
  - vs PyO3: comparison.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jagtesh
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/applepy-cli/
